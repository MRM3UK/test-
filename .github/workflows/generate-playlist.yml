name: Generate M3U Playlist

on:
  schedule:
    # Batch scrape: every 1.5 hours for building full playlist
    - cron: '0 */2 * * *'
    # New content check: every 3 hours (offset by 30 min)
    - cron: '30 */3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: batch (33 pages from last position) or refresh (first 2 pages)'
        required: false
        default: 'batch'
        type: choice
        options:
          - batch
          - refresh
          - reset

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          # Manual trigger
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "Mode: ${{ github.event.inputs.mode }} (manual)"
            exit 0
          fi

          # Scheduled trigger - check cron
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)

          # If state file says we reached the end, do refresh only
          if [ -f scraper_state.json ]; then
            COMPLETED=$(python3 -c "import json;s=json.load(open('scraper_state.json'));print(s.get('completed',False))" 2>/dev/null || echo "False")
            if [ "$COMPLETED" = "True" ]; then
              echo "mode=refresh" >> $GITHUB_OUTPUT
              echo "Mode: refresh (all pages already scraped)"
              exit 0
            fi
          fi

          # Check if this is the refresh cron (30 min offset)
          if [ "$MINUTE" = "30" ]; then
            echo "mode=refresh" >> $GITHUB_OUTPUT
            echo "Mode: refresh (scheduled)"
          else
            echo "mode=batch" >> $GITHUB_OUTPUT
            echo "Mode: batch (scheduled)"
          fi

      - name: Run scraper
        run: python scraper.py --mode ${{ steps.mode.outputs.mode }} 2>&1 | tee scraper.log
        env:
          PYTHONUNBUFFERED: "1"

      - name: Results summary
        if: always()
        run: |
          echo "========================================="
          if [ -f scraper_state.json ]; then
            python3 -c "
          import json
          s = json.load(open('scraper_state.json'))
          print(f\"Mode:           {s.get('last_mode','?')}\")
          print(f\"Last page:      {s.get('last_page',0)}\")
          print(f\"Completed:      {s.get('completed',False)}\")
          print(f\"Total videos:   {s.get('total_videos',0)}\")
          print(f\"Last run:       {s.get('last_run','?')}\")
          print(f\"Runs count:     {s.get('run_count',0)}\")
          "
          fi
          echo "========================================="
          if [ -f playlist.m3u ]; then
            echo "M3U lines: $(wc -l < playlist.m3u)"
            echo "M3U size:  $(du -h playlist.m3u | cut -f1)"
          fi
          echo "========================================="

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 3

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add playlist.m3u playlist.json scraper_state.json
          VCOUNT=$(python3 -c "import json;print(len(json.load(open('playlist.json'))))" 2>/dev/null || echo 0)
          MODE="${{ steps.mode.outputs.mode }}"
          PAGE=$(python3 -c "import json;print(json.load(open('scraper_state.json')).get('last_page',0))" 2>/dev/null || echo 0)
          git diff --staged --quiet || git commit -m "🔄 [${MODE}] ${VCOUNT} videos | page ${PAGE} | $(date -u +'%H:%M UTC')"
          git push
