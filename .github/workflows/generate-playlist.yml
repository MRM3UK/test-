# .github/workflows/generate-playlist.yml
name: Generate M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py 2>&1 | tee scraper.log
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show results
        run: |
          echo "=== Playlist entries ==="
          if [ -f playlist.json ]; then
            python -c "import json; data=json.load(open('playlist.json')); print(f'Total: {len(data)} videos'); [print(f'  {i+1}. {d[\"title\"][:50]}') for i,d in enumerate(data)]"
          fi
          echo "=== M3U file size ==="
          wc -c playlist.m3u 2>/dev/null || echo "No playlist.m3u"

      - name: Upload scraper log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-log
          path: scraper.log
          retention-days: 7

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u playlist.json index.html
          git diff --staged --quiet || git commit -m "🔄 Updated playlist - $(date -u +'%Y-%m-%d %H:%M:%S UTC') - $(python -c 'import json;print(len(json.load(open("playlist.json"))))' 2>/dev/null || echo 0) videos"
          git push
