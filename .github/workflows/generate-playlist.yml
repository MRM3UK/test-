name: Generate M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py 2>&1 | tee scraper.log
        env:
          PYTHONUNBUFFERED: "1"

      - name: Show results
        if: always()
        run: |
          echo "========== RESULTS =========="
          if [ -f playlist.json ]; then
            python3 -c "
          import json
          data = json.load(open('playlist.json'))
          print(f'Total videos: {len(data)}')
          for i, d in enumerate(data[:20]):
              print(f\"  {i+1}. {d['title'][:60]}\")
              print(f\"     {d['stream_url'][:80]}\")
          "
          else
            echo "No playlist.json found"
          fi
          echo "============================="

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-log
          path: scraper.log
          retention-days: 7

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add playlist.m3u playlist.json index.html
          COUNT=$(python3 -c "import json;print(len(json.load(open('playlist.json'))))" 2>/dev/null || echo 0)
          git diff --staged --quiet || git commit -m "🔄 Playlist updated: ${COUNT} videos - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
