name: Generate M3U Playlist

on:
  schedule:
    - cron: '0 */2 * * *'
    - cron: '30 */3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'batch | refresh | reset'
        required: false
        default: 'batch'
        type: choice
        options:
          - batch
          - refresh
          - reset
      start_page:
        description: 'Force start from this page (optional, batch only)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ -f scraper_state.json ]; then
            COMPLETED=$(python3 -c "import json;print(json.load(open('scraper_state.json')).get('completed',False))" 2>/dev/null || echo "False")
            MINUTE=$(date -u +%M)
            if [ "$COMPLETED" = "True" ] || [ "$MINUTE" = "30" ]; then
              echo "mode=refresh" >> $GITHUB_OUTPUT
            else
              echo "mode=batch" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=batch" >> $GITHUB_OUTPUT
          fi

      - name: Show current state
        run: |
          echo "=== CURRENT STATE ==="
          if [ -f scraper_state.json ]; then
            cat scraper_state.json
          else
            echo "No state file - first run"
          fi
          echo ""
          if [ -f playlist.json ]; then
            echo "Existing videos: $(python3 -c 'import json;print(len(json.load(open("playlist.json"))))' 2>/dev/null || echo 0)"
          fi
          echo "===================="

      - name: Run scraper
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ github.event.inputs.start_page }}" != "" ]; then
            ARGS="$ARGS --start-page ${{ github.event.inputs.start_page }}"
          fi
          python scraper.py $ARGS 2>&1 | tee scraper.log
        env:
          PYTHONUNBUFFERED: "1"

      - name: Results
        if: always()
        run: |
          echo "========================================="
          if [ -f scraper_state.json ]; then
            python3 -c "
          import json
          s = json.load(open('scraper_state.json'))
          print(f\"Mode:         {s.get('last_mode','?')}\")
          print(f\"Last page:    {s.get('last_page',0)}\")
          print(f\"Completed:    {s.get('completed',False)}\")
          print(f\"Total videos: {s.get('total_videos',0)}\")
          print(f\"Last run:     {s.get('last_run','?')}\")
          print(f\"Run count:    {s.get('run_count',0)}\")
          "
          fi
          echo "========================================="

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-log-${{ github.run_number }}
          path: scraper.log
          retention-days: 3

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add playlist.m3u playlist.json scraper_state.json
          VCOUNT=$(python3 -c "import json;print(len(json.load(open('playlist.json'))))" 2>/dev/null || echo 0)
          MODE="${{ steps.mode.outputs.mode }}"
          PAGE=$(python3 -c "import json;print(json.load(open('scraper_state.json')).get('last_page',0))" 2>/dev/null || echo 0)
          git diff --staged --quiet || git commit -m "🔄 [${MODE}] ${VCOUNT} videos | page ${PAGE} | $(date -u +'%H:%M UTC')"
          git push
